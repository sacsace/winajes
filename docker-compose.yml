services:
  postgres:
    image: postgres:16-alpine
    container_name: winajes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: winajes
      POSTGRES_PASSWORD: winajes_dev_password
      POSTGRES_DB: winajes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: winajes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
